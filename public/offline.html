<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f3b57">
  <title>CaribWeather Offline</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; background: #061826; color: white; }
    main { max-width: 36rem; border: 1px solid rgba(255,255,255,.16); border-radius: 2rem; padding: 2rem; background: rgba(255,255,255,.08); }
    h1 { margin: 0; font-size: clamp(2rem, 6vw, 4rem); }
    p { color: rgba(255,255,255,.78); line-height: 1.7; }
    a { color: #2dd4bf; font-weight: 900; }
  </style>
</head>
<body>
  <main>
    <h1>Offline Mode</h1>
    <p>CaribWeather cannot reach the network right now. Reopen the dashboard to view cached app content and the most recently saved weather data.</p>
    <a href="/">Return to CaribWeather</a>
  </main>
</body>
</html>
